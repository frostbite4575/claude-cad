<div class="logo">C</div>

<div class="separator"></div>

<!-- File operations -->
<button class="toolbar-btn" title="Save Project (Ctrl+S)" (click)="saveProject()">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M5 3h8l3 3v9a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z" stroke="currentColor" stroke-width="1.5"/>
    <path d="M7 3v4h6V3" stroke="currentColor" stroke-width="1.5"/>
    <path d="M7 13h6M7 15h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
</button>

<button class="toolbar-btn" title="Open Project (Ctrl+O)" (click)="loadProject()">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M3 7V5a2 2 0 012-2h3l2 2h5a2 2 0 012 2v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M2 10a1 1 0 011-1h14a1 1 0 011 1l-1 6a1 1 0 01-1 1H4a1 1 0 01-1-1L2 10z" stroke="currentColor" stroke-width="1.5"/>
  </svg>
</button>

<div class="separator"></div>

<!-- Undo / Redo -->
<button class="toolbar-btn" title="Undo (Ctrl+Z)" (click)="undo()">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M5 10h10a3 3 0 010 6H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M8 7L5 10l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<button class="toolbar-btn" title="Redo (Ctrl+Y)" (click)="redo()">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M15 10H5a3 3 0 000 6h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M12 7l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<div class="separator"></div>

<!-- Sketch plane selector -->
<button class="toolbar-btn plane-btn" title="Sketch plane (click to cycle)" (click)="cycleSketchPlane()">
  {{ sketchPlane }}
</button>

<!-- Drawing tools -->
<button class="toolbar-btn" title="Line (L)" [ngClass]="{ active: activeTool === 'line' }" (click)="setTool('line')">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="4" y1="16" x2="16" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
</button>

<button class="toolbar-btn" title="Rectangle (R)" [ngClass]="{ active: activeTool === 'rectangle' }" (click)="setTool('rectangle')">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="3" y="5" width="14" height="10" rx="0.5" stroke="currentColor" stroke-width="1.5"/>
  </svg>
</button>

<button class="toolbar-btn" title="Circle (C)" [ngClass]="{ active: activeTool === 'circle' }" (click)="setTool('circle')">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/>
  </svg>
</button>

<button class="toolbar-btn" title="Arc (A)" [ngClass]="{ active: activeTool === 'arc' }" (click)="setTool('arc')">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M4 14 A8 8 0 0 1 16 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </svg>
</button>

<button class="toolbar-btn" title="Measure (M)" [ngClass]="{ active: activeTool === 'measure' }" (click)="setTool('measure')">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M3 17L17 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M3 17v-4M3 17h4M17 3v4M17 3h-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  </svg>
</button>

<div class="separator"></div>

<!-- Selection actions -->
<button class="toolbar-btn" title="Extrude selected sketch (E)" [class.disabled]="!hasSelection" (click)="extrudeSelected()">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="5" y="10" width="10" height="7" rx="0.5" stroke="currentColor" stroke-width="1.5"/>
    <path d="M5 10l3-5h4l3 5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M8 5h4l3 5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" opacity="0.4"/>
  </svg>
</button>

<button class="toolbar-btn" title="Delete selected entity (Del)" [class.disabled]="!hasSelection" (click)="deleteSelected()">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M6 6h8M7 6V5a1 1 0 011-1h4a1 1 0 011 1v1M8 9v4M12 9v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M5 6h10l-1 10a1 1 0 01-1 1H7a1 1 0 01-1-1L5 6z" stroke="currentColor" stroke-width="1.5"/>
  </svg>
</button>

<div class="separator"></div>

<!-- Export -->
<button class="toolbar-btn" title="Export DXF" (click)="exportDxf()">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 3v10M10 13l-3.5-3.5M10 13l3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3 15v1a1 1 0 001 1h12a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<button class="toolbar-btn" title="Export STEP" (click)="exportStep()">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 3v10M10 13l-3.5-3.5M10 13l3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3 15v1a1 1 0 001 1h12a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="13" y="2" width="5" height="4" rx="1" fill="#16162a" stroke="currentColor" stroke-width="1"/>
    <text x="15.5" y="5" text-anchor="middle" font-size="3" fill="currentColor" font-family="monospace">3D</text>
  </svg>
</button>

<button class="toolbar-btn" title="Export STL" (click)="exportStl()">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 3v10M10 13l-3.5-3.5M10 13l3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3 15v1a1 1 0 001 1h12a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="13" y="2" width="5" height="4" rx="1" fill="#16162a" stroke="currentColor" stroke-width="1"/>
    <text x="15.5" y="5" text-anchor="middle" font-size="3" fill="currentColor" font-family="monospace">STL</text>
  </svg>
</button>

<div class="separator"></div>

<!-- Import -->
<button class="toolbar-btn" title="Import STEP file" (click)="importStep()">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 13V3M10 3l-3.5 3.5M10 3l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3 15v1a1 1 0 001 1h12a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>
